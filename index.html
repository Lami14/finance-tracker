<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker</title>

<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Finance Tracker</h1>

<div class="container">

<h2>Your Balance</h2>
<h3 id="balance">$0.00</h3>

<div class="income-expense">

<div>
<h4>Income</h4>
<p id="money-plus">$0.00</p>
</div>

<div>
<h4>Expense</h4>
<p id="money-minus">$0.00</p>
</div>

</div>

<h3>Add Transaction</h3>

<form id="form">

<input type="text" id="text" placeholder="Description" required>

<input type="number" id="amount" placeholder="Amount (+income, -expense)" required>

<select id="category">
<option value="Food">Food</option>
<option value="Transport">Transport</option>
<option value="Bills">Bills</option>
<option value="Shopping">Shopping</option>
<option value="Salary">Salary</option>
<option value="Other">Other</option>
</select>

<button>Add Transaction</button>

</form>

<h3>History</h3>

<ul id="list"></ul>

<h3>Spending Chart</h3>

<canvas id="chart"></canvas>

</div>

<script src="script.js"></script>

</body>

</html>
